<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weatherverse</title> 
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/main_screen_1.css">
</head>
<body> 
    <div class="app">
        <div class="header">
            <h3 class="clock">0:00</h3>
        </div>
        <div class="main">
            <div class="main-screen-1">
                <img class="main-screen-1-house" src="images/house.png" alt="">
                <div class="main-screen-1-weather-info">
                    <h1 class="main-screen-1-weather-city">Montreal</h1>
                    <h1 class="main-screen-1-weather-celsius">19°</h1>
                    <h3 class="main-screen-1-weather-status">Mostly Clear</h3>
                    <div class="main-screen-1-weather-h-l">
                        <h3 class="main-screen-1-weather-h">H: 24°</h3>
                        <h3 class="main-screen-1-weather-l">L: 18°</h3>
                    </div>
                </div>
                <div class="main-screen-1-weather-schedule">
                    <div class="main-screen-1-weather-schedule-sections">
                        <div class="main-screen-1-weather-schedule-bar"></div>
                        <button class="main-screen-1-weather-schedule-sections-hourly-forecast-btn"><h3>Hourly Forecast</h3></button>
                        <button class="main-screen-1-weather-schedule-sections-weekly-forecast-btn"><h3>Weekly Forecast</h3></button>
                    </div>
                    <div class="main-screen-1-weather-schedule-results">
                        <div class="main-screen-1-weather-schedule-results-result">
                            <div class="main-screen-1-weather-schedule-results-result-hour">
                                <h3>12 AM</h3>
                            </div>
                            <div class="main-screen-1-weather-schedule-results-result-icon"></div>
                            <div class="main-screen-1-weather-schedule-results-result-celsius">
                                <h3>19°</h3>
                            </div>
                        </div>
                        <div class="main-screen-1-weather-schedule-results-result">
                            <div class="main-screen-1-weather-schedule-results-result-hour">
                                <h3>12 AM</h3>
                            </div>
                            <div class="main-screen-1-weather-schedule-results-result-icon"></div>
                            <div class="main-screen-1-weather-schedule-results-result-celsius">
                                <h3>19°</h3>
                            </div>
                        </div>
                        <div class="main-screen-1-weather-schedule-results-result">
                            <div class="main-screen-1-weather-schedule-results-result-hour">
                                <h3>12 AM</h3>
                            </div>
                            <div class="main-screen-1-weather-schedule-results-result-icon"></div>
                            <div class="main-screen-1-weather-schedule-results-result-celsius">
                                <h3>19°</h3>
                            </div>
                        </div>
                        <div class="main-screen-1-weather-schedule-results-result">
                            <div class="main-screen-1-weather-schedule-results-result-hour">
                                <h3>12 AM</h3>
                            </div>
                            <div class="main-screen-1-weather-schedule-results-result-icon"></div>
                            <div class="main-screen-1-weather-schedule-results-result-celsius">
                                <h3>19°</h3>
                            </div>
                        </div>
                        <div class="main-screen-1-weather-schedule-results-result">
                            <div class="main-screen-1-weather-schedule-results-result-hour">
                                <h3>12 AM</h3>
                            </div>
                            <div class="main-screen-1-weather-schedule-results-result-icon"></div>
                            <div class="main-screen-1-weather-schedule-results-result-celsius">
                                <h3>19°</h3>
                            </div>
                        </div>
                        <div class="main-screen-1-weather-schedule-results-result">
                            <div class="main-screen-1-weather-schedule-results-result-hour">
                                <h3>12 AM</h3>
                            </div>
                            <div class="main-screen-1-weather-schedule-results-result-icon"></div>
                            <div class="main-screen-1-weather-schedule-results-result-celsius">
                                <h3>19°</h3>
                            </div>
                        </div>
                        
                    </div>
                    <div class="main-screen-1-weather-schedule-btns">
                        <div class="main-screen-1-weather-schedule-btns-plus-btn">
                            <div class="main-screen-1-weather-schedule-btns-plus-btn-background">
                                <i class="fa-solid fa-plus"></i>
                            </div>
                        </div>
                        <div class="main-screen-1-weather-schedule-btns-location-btn"><i class="fa-solid fa-location-crosshairs"></i></div>
                        <div class="main-screen-1-weather-schedule-btns-bars-btn""><i class="fa-solid fa-bars"></i></div>
                    </div>
                </div>
            </div>
            <div class="main-screen-2">
                <div class="main-screen-2-weather-searchbar">

                </div>
                <div class="main-screen-2-weather-search-results">

                </div>
                <div class="main-screen-2-weather-weather-socials">
                    
                </div>
            </div>
        </div>
    </div> 
    <script src="js/index.js"></script>
    <script src="https://kit.fontawesome.com/170b78e22f.js" crossorigin="anonymous"></script>
</body>
</html>
