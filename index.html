<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta 
      name='viewport' 
      content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'
    >
    <title>Weatherverse</title> 
    <link rel='stylesheet' href='css/index.css'>
    <link rel='stylesheet' href='css/main_screen_1.css'>
    <link rel='stylesheet' href='css/main_screen_2.css'>

</head>
<body> 
    <div class='app'>
        <div class='header'>
            <div class='header-clock'>
                <h3>0:00</h3>
            </div>
            <div class='header-icons'>
                <i class='fa-solid fa-signal'></i>
                <i class='fa-solid fa-wifi'></i>
                <i class='fa-solid fa-battery-full'></i>
            </div>
        </div>
        <div class='main'>
            <div class='main-screen-1'>
                <div class="main-screen-1-mask"></div>
                <img class='main-screen-1-house' src='images/house.svg' alt='' draggable="false">
                <div class='main-screen-1-weather-info'>
                    <h1 class='main-screen-1-weather-city'>Montreal</h1>
                    <h1 class='main-screen-1-weather-celsius'>19°</h1>
                    <h3 class='main-screen-1-weather-status'>Mostly Clear</h3>
                    <div class='main-screen-1-weather-h-l'>
                        <h3 class='main-screen-1-weather-h'>H: 24°</h3>
                        <h3 class='main-screen-1-weather-l'>L: 18°</h3>
                    </div>
                </div>
                <div class='main-screen-1-weather-schedule'>
                    <div class='main-screen-1-weather-schedule-sections'>
                        <div class='main-screen-1-weather-schedule-bar'></div>
                        <button class='main-screen-1-weather-schedule-sections-hourly-forecast-btn'><h3>Hourly Forecast</h3></button>
                        <button class='main-screen-1-weather-schedule-sections-weekly-forecast-btn'><h3>Weekly Forecast</h3></button>
                        <div class='main-screen-1-weather-schedule-sections-loader'>
                            <div class='main-screen-1-weather-schedule-sections-loader-keep'>
                                <div class='main-screen-1-weather-schedule-sections-loader-keeper'></div>
                            </div>
                        </div>
                    </div>
                    <div class='main-screen-1-weather-schedule-results'></div>
                    <div class='main-screen-1-weather-schedule-btns'>
                        <div class='main-screen-1-weather-schedule-btns-shape'>
                            <img src='images/shape1.png' alt='' draggable="false">
                        </div>
                        <div class='main-screen-1-weather-schedule-btns-plus-btn'>
                            <div class='main-screen-1-weather-schedule-btns-plus-btn-background'>
                                <button><i class='fa-solid fa-plus'></i></button>
                            </div>
                        </div>
                        <div class='main-screen-1-weather-schedule-btns-location-btn'>
                            <button><i class='fa-solid fa-location-crosshairs'></i></button>
                        </div>
                        <div class='main-screen-1-weather-schedule-btns-bars-btn'>
                            <button><i class='fa-solid fa-bars'></i></button>
                        </div>
                    </div>
                </div>
            </div>
            <div class='main-screen-2'>
                <div class='main-screen-2-weather-search-place'>
                    <div class='main-screen-2-weather-search-place-header'>
                        <div class='main-screen-2-weather-search-place-return-btn'>
                            <button>
                                 <span></span>
                            </button>
                            <h3>Weather</h3>
                        </div>
                        <div class='main-screen-2-weather-search-place-options-btn'>
                            <div class='main-screen-2-weather-search-place-options-btn-background'>
                                <i class='fa-solid fa-ellipsis'></i>
                            </div>
                        </div>
                    </div>
                    <div class='main-screen-2-weather-search-place-searchbar'>
                        <input type='text' placeholder='Search for a city or airport' maxlength='50' required>
                        <i class='fa-solid fa-magnifying-glass'></i>
                    </div>
                </div>
                <div class='main-screen-2-weather-search-results'></div>
            </div>
        </div>
    </div> 
    <script src='js/index.js' type='module'></script>
    <script src='https://kit.fontawesome.com/170b78e22f.js' crossorigin='anonymous'></script>
</body>
</html>
